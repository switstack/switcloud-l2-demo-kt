name: ci

on:
  push:
    branches:
      - 'develop'
      - 'main'
      - 'release/*'
    tags:
      - '**'
  pull_request:
  pull_request_review:
    types: [submitted]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-detekt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug all variants (Gradle assemble)
      run: ./gradlew assembleDebug --stacktrace

    - name: Run Detekt analysis (fast mode)
      run: ./gradlew :switcloud-l2-demo:detekt --no-daemon --parallel --configuration-cache --build-cache --stacktrace

    - name: Upload Detekt report (HTML)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: detekt-report
        path: |
          switcloud-l2-demo/build/reports/detekt/detekt.html
          switcloud-l2-demo/build/reports/detekt.html
          **/build/reports/detekt*/**/*.html
        if-no-files-found: warn